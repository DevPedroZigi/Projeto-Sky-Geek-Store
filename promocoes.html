<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoções Épicas - Sky Geek Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nuvens">
            <img class="nuvem n1" src="images/nuvem-pixelada-sem-fundo.png" alt="Nuvem">
            <img class="nuvem n2" src="images/nuvem-pixelada-sem-fundo.png" alt="Nuvem">
            <img class="nuvem n3" src="images/nuvem-pixelada-sem-fundo.png" alt="Nuvem">
            <img class="nuvem n4" src="images/nuvem-pixelada-sem-fundo.png" alt="Nuvem">
            <img class="nuvem n5" src="images/nuvem-pixelada-sem-fundo.png" alt="Nuvem">
            <img class="nuvem n6" src="images/nuvem-pixelada-sem-fundo.png" alt="Nuvem">
        </div>
        <h1><a href="index.html" class="logo-link">Sky Geek Store</a></h1>
        <p>Aproveite nossas ofertas antes que o tempo acabe!</p>
        
        <nav class="botoes-navegacao">
            <a href="index.html" class="botao botao-azul">Voltar para Loja</a>
        </nav>
    </header>

    <main class="conteudo-principal">
        <h2>Ofertas de Tempo Limitado</h2>
        
        <div class="container-promocoes">
            <div class="produto promo-card">
                <span class="tag-desconto">-20%</span>
                <img src="images/estatua himmel.png" alt="Action Figure Himmel">
                <div class="detalhes-promo">
                    <h3>Action Figure Himmel</h3>
                    <p class="preco-antigo">De: R$ 50,00</p>
                    <p class="preco-novo">Por: R$ 40,00</p>
                    <button class="botao-comprar-promo">Resgatar Oferta</button>
                </div>
            </div>

            </div>
    </main>

    <footer>
        <p>Sky Geek Store - Promoções válidas enquanto durarem os estoques.</p>
    </footer>
</body>
</html>
